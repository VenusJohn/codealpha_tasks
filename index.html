<!DOCTYPE html>
<html>
<head>
<title>Flashcard Quiz App</title>

<style>

body{
font-family:Arial;
background:#eef2f3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:25px;
width:400px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

img{
width:220px;
height:160px;
object-fit:cover;
border-radius:8px;
margin:10px 0;
}

button{
padding:10px 15px;
margin:6px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#answer{
color:green;
font-weight:bold;
font-size:18px;
}

</style>

</head>
<body>

<div class="container">

<h2>Flashcard Quiz App</h2>

<h3 id="question"></h3>

<img id="image">

<br>

<button onclick="showAnswer()">Show Answer</button>

<p id="answer"></p>

<br>

<button onclick="prevCard()">Previous</button>
<button onclick="nextCard()">Next</button>

</div>

<script>

let flashcards=[

{
question:"Which fruit is shown in the picture?",
answer:"Apple",
image:"https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg"
},

{
question:"Which animal is this?",
answer:"Cat",
image:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Cat03.jpg"
},

{
question:"Which animal is this?",
answer:"Dog",
image:"https://upload.wikimedia.org/wikipedia/commons/6/6e/Golde33443.jpg"
},

{
question:"Which fruit is this?",
answer:"Banana",
image:"https://upload.wikimedia.org/wikipedia/commons/8/8a/Banana-Single.jpg"
},

{
question:"Which animal is known as the king of the jungle?",
answer:"Lion",
image:"https://upload.wikimedia.org/wikipedia/commons/7/73/Lion_waiting_in_Namibia.jpg"
}

];

let current=0;

function showCard(){

document.getElementById("question").innerText=
flashcards[current].question;

document.getElementById("image").src=
flashcards[current].image;

document.getElementById("answer").innerText="";

}

function showAnswer(){

document.getElementById("answer").innerText=
flashcards[current].answer;

}

function nextCard(){

current++;

if(current>=flashcards.length){
current=0;
}

showCard();

}

function prevCard(){

current--;

if(current<0){
current=flashcards.length-1;
}

showCard();

}

showCard();

</script>

</body>
</html>
